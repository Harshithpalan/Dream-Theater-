<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Theater — Live Your Dreams</title>
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Raleway:ital,wght@0,300;0,400;0,600;1,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --void: #04020f;
    --deep: #0b0520;
    --iris: #4a1e8a;
    --violet: #7c3aed;
    --astral: #a78bfa;
    --gold: #f5c842;
    --crimson: #e11d48;
    --teal: #14b8a6;
    --mist: rgba(167,139,250,0.12);
    --glass: rgba(255,255,255,0.04);
  }

  html, body {
    height: 100%; overflow: hidden;
    background: var(--void);
    color: #e9e4ff;
    font-family: 'Raleway', sans-serif;
  }

  /* ── DREAM CANVAS ── */
  #dreamCanvas {
    position: fixed; inset: 0; width: 100%; height: 100%;
    z-index: 0;
  }

  /* ── PARTICLES ── */
  #particleCanvas {
    position: fixed; inset: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 1;
  }

  /* ── CAMERA FEED ── */
  #cameraWrap {
    position: fixed; top: 24px; right: 24px; z-index: 50;
    width: 180px;
  }
  #videoEl {
    width: 180px; height: 135px; border-radius: 16px;
    object-fit: cover; transform: scaleX(-1);
    border: 2px solid var(--astral);
    box-shadow: 0 0 24px rgba(124,58,237,0.5);
  }
  #faceCanvas {
    position: absolute; top: 0; left: 0;
    width: 180px; height: 135px;
    border-radius: 16px; transform: scaleX(-1);
  }
  #expressionBadge {
    margin-top: 8px; text-align: center;
    font-size: 13px; font-weight: 600; letter-spacing: 0.1em;
    padding: 6px 12px; border-radius: 20px;
    background: var(--glass);
    backdrop-filter: blur(12px);
    border: 1px solid var(--mist);
    text-transform: uppercase;
    transition: all 0.4s;
  }

  /* ── STORY OVERLAY ── */
  #storyOverlay {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    justify-content: flex-end; align-items: center;
    padding-bottom: 100px;
    pointer-events: none;
  }
  #storyText {
    max-width: 680px; text-align: center;
    padding: 24px 32px;
    background: linear-gradient(135deg, rgba(10,2,30,0.82), rgba(74,30,138,0.45));
    backdrop-filter: blur(16px);
    border: 1px solid rgba(167,139,250,0.2);
    border-radius: 20px;
    font-size: 18px; font-style: italic; font-weight: 300;
    line-height: 1.7; color: #e9e4ff;
    text-shadow: 0 2px 12px rgba(74,30,138,0.8);
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.6s, transform 0.6s;
    pointer-events: none;
  }
  #storyText.visible { opacity: 1; transform: translateY(0); }

  /* ── HEADER ── */
  #header {
    position: fixed; top: 24px; left: 24px; z-index: 50;
  }
  #header h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: 22px; font-weight: 700;
    background: linear-gradient(120deg, #a78bfa, #f5c842, #a78bfa);
    background-size: 200%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: shimmer 4s linear infinite;
  }
  #header p {
    font-size: 11px; letter-spacing: 0.15em; color: #9ca3af;
    text-transform: uppercase; margin-top: 2px;
  }
  @keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }

  /* ── CONTROLS ── */
  #controls {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 50; display: flex; gap: 12px; align-items: center;
  }
  .btn {
    padding: 10px 22px; border-radius: 30px; border: none; cursor: pointer;
    font-family: 'Raleway', sans-serif; font-size: 13px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    transition: all 0.25s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--violet), var(--iris));
    color: #fff; box-shadow: 0 0 20px rgba(124,58,237,0.5);
  }
  .btn-primary:hover { transform: scale(1.06); box-shadow: 0 0 30px rgba(124,58,237,0.8); }
  .btn-secondary {
    background: var(--glass); color: var(--astral);
    border: 1px solid rgba(167,139,250,0.3);
    backdrop-filter: blur(8px);
  }
  .btn-secondary:hover { background: rgba(167,139,250,0.1); }
  .btn-danger {
    background: linear-gradient(135deg, #be123c, #9f1239);
    color: #fff;
  }

  /* ── DREAM LOG ── */
  #dreamLog {
    position: fixed; left: 24px; bottom: 24px; z-index: 50;
    width: 260px; max-height: 200px;
    display: none; flex-direction: column; gap: 6px;
    overflow-y: auto;
  }
  #dreamLog.open { display: flex; }
  #dreamLog h3 {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--astral); margin-bottom: 4px;
  }
  .log-entry {
    padding: 8px 12px; border-radius: 10px;
    background: rgba(10,2,30,0.7); border-left: 2px solid var(--violet);
    font-size: 12px; line-height: 1.5; color: #c4b5fd;
    backdrop-filter: blur(8px);
  }
  .log-entry .log-meta {
    font-size: 10px; color: #6b7280; margin-bottom: 2px; text-transform: uppercase;
  }

  /* ── STATUS ── */
  #status {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 100; text-align: center; pointer-events: none;
  }
  #statusText {
    font-family: 'Cinzel Decorative', serif; font-size: 16px;
    color: var(--astral); letter-spacing: 0.1em;
    text-shadow: 0 0 30px rgba(167,139,250,0.6);
  }
  #statusSpinner {
    width: 40px; height: 40px; margin: 16px auto 0;
    border: 2px solid rgba(167,139,250,0.2);
    border-top-color: var(--astral);
    border-radius: 50%; animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SCENE CHARACTER SVGs ── */
  .dream-char {
    position: absolute; bottom: 0; pointer-events: none;
    opacity: 0; transition: opacity 1.2s;
  }
  .dream-char.visible { opacity: 1; }

  /* expression color map */
  .badge-happy    { color: var(--gold); border-color: rgba(245,200,66,0.4); }
  .badge-sad      { color: #93c5fd; border-color: rgba(147,197,253,0.4); }
  .badge-angry    { color: var(--crimson); border-color: rgba(225,29,72,0.4); }
  .badge-fearful  { color: #a78bfa; border-color: rgba(167,139,250,0.5); }
  .badge-disgusted{ color: var(--teal); border-color: rgba(20,184,166,0.4); }
  .badge-surprised{ color: #fb923c; border-color: rgba(251,146,60,0.4); }
  .badge-neutral  { color: #9ca3af; border-color: rgba(156,163,175,0.3); }

  #logToggle {
    position: fixed; left: 24px; bottom: 24px; z-index: 51;
  }

  /* ── RECORD DOT ── */
  #recDot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--crimson); display: inline-block;
    animation: pulse 1.2s ease infinite; margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
</style>
</head>

//  STORY GENERATOR — uses Anthropic API
// ══════════════════════════════════════════════

async function generateStory(mood) {
  const prompts = {
    happy:     'A golden hero soars through amber clouds, laughing as sunflowers erupt from the earth below.',
    sad:       'Rain falls in slow motion. A lone figure stands at the edge of a silver lake, whispering forgotten names.',
    angry:     'A warrior bathed in flame tears through iron gates. The sky cracks open like a wound.',
    fearful:   'Shadows peel from the walls and drift closer. Something enormous breathes behind the last door.',
    disgusted: 'Ancient vines consume a forgotten city. Strange luminescent fungi pulse with each heartbeat.',
    surprised: 'A portal tears open mid-air — a glowing figure steps through, eyes wide as twin moons.',
    neutral:   'You drift between floating islands. Stars hum softly. The dream waits for your emotion.'
  };

  // Try Anthropic API for a richer story
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `You are a poetic dream narrator. Write ONE immersive sentence (max 30 words) describing a vivid dream scene for the emotion: "${mood}". Be lyrical and cinematic. No quotes, no attribution.`
        }]
      })
    });
    if (res.ok) {
      const data = await res.json();
      const text = data.content?.find(b => b.type === 'text')?.text?.trim();
      if (text) return text;
    }
  } catch(e) {}

  return prompts[mood] || prompts.neutral;
}

// ══════════════════════════════════════════════
//  PARTICLE SYSTEM
// ══════════════════════════════════════════════

function spawnParticles(mood) {
  const m = MOODS[mood];
  const count = mood === 'angry' ? 40 : mood === 'surprised' ? 60 : 25;
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * (mood === 'angry' ? 4 : 1.5),
      vy: mood === 'sad' ? Math.random() * 2 + 0.5 : (Math.random() - 0.5) * 2 - (mood === 'happy' ? 1 : 0),
      r: Math.random() * 3 + 1,
      color: m.accent,
      life: 1, decay: Math.random() * 0.008 + 0.003,
      twinkle: mood !== 'angry' && mood !== 'sad'
    });
  }
}

function updateParticles() {
  pctx.clearRect(0, 0, W, H);
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    const a = p.twinkle ? p.life * (0.5 + 0.5 * Math.sin(t * 3 + p.x)) : p.life;
    pctx.beginPath();
    pctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    pctx.fillStyle = p.color + Math.floor(a * 255).toString(16).padStart(2, '0');
    pctx.fill();
  }
}

// ══════════════════════════════════════════════
//  DRAW BACKGROUND SCENE
// ══════════════════════════════════════════════

function lerp(a, b, t) { return a + (b - a) * t; }
function hexToRgb(h) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
  return r ? [parseInt(r[1],16), parseInt(r[2],16), parseInt(r[3],16)] : [0,0,0];
}
function lerpColor(c1, c2, t) {
  const [r1,g1,b1] = hexToRgb(c1), [r2,g2,b2] = hexToRgb(c2);
  return `rgb(${Math.round(lerp(r1,r2,t))},${Math.round(lerp(g1,g2,t))},${Math.round(lerp(b1,b2,t))})`;
}

function drawScene() {
  const mood = MOODS[currentMood];
  const sky  = mood.sky;

  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  sky.forEach((c, i) => grad.addColorStop(i / (sky.length - 1), c));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Nebula clouds
  drawNebula(mood);

  // Moon / sun
  if (currentMood === 'happy') drawSun();
  else drawMoon();

  // Ground layer
  drawGround(mood);

  // Rain
  if (mood.rain) drawRain();

  // Fire
  if (mood.fire) drawFire();

  // Character
  drawCharSVG(mood);
}

function drawNebula(mood) {
  const cols = [mood.accent, '#0b0520'];
  for (let i = 0; i < 5; i++) {
    const x = W * (0.1 + i * 0.2) + Math.sin(t * 0.3 + i) * 60;
    const y = H * 0.3 + Math.cos(t * 0.2 + i) * 40;
    const r = 120 + i * 40;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, mood.accent + '28');
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  }
}

function drawMoon() {
  const mx = W * 0.15, my = H * 0.18;
  const g = ctx.createRadialGradient(mx, my, 0, mx, my, 55);
  g.addColorStop(0, '#e9e4ff'); g.addColorStop(1, 'rgba(167,139,250,0)');
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(mx, my, 55, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#e9e4ff'; ctx.beginPath(); ctx.arc(mx, my, 30, 0, Math.PI*2); ctx.fill();
}

function drawSun() {
  const sx = W * 0.15, sy = H * 0.2;
  const rays = 12;
  ctx.save();
  ctx.translate(sx, sy);
  for (let i = 0; i < rays; i++) {
    ctx.rotate(Math.PI * 2 / rays);
    ctx.fillStyle = 'rgba(245,200,66,0.15)';
    ctx.beginPath(); ctx.ellipse(0, -60, 8, 40, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
  const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, 80);
  g.addColorStop(0, '#f5c842'); g.addColorStop(0.4, '#fb923c60'); g.addColorStop(1, 'transparent');
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(sx, sy, 80, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f5c842'; ctx.beginPath(); ctx.arc(sx, sy, 28, 0, Math.PI*2); ctx.fill();
}

function drawGround(mood) {
  const g = ctx.createLinearGradient(0, H * 0.7, 0, H);
  g.addColorStop(0, 'transparent');
  g.addColorStop(1, mood.accent + '40');
  ctx.fillStyle = g; ctx.fillRect(0, H * 0.7, W, H * 0.3);

  // Horizon silhouette
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.moveTo(0, H);
  const pts = 20;
  for (let i = 0; i <= pts; i++) {
    const x = (i / pts) * W;
    const y = H * 0.75 + Math.sin(t * 0.4 + i * 0.8) * 15
              + Math.sin(i * 0.5) * 40
              + (currentMood === 'angry' ? Math.sin(t * 2 + i) * 20 : 0);
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
}

function drawRain() {
  ctx.strokeStyle = 'rgba(147,197,253,0.3)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 80; i++) {
    const x = (i * 37 + t * 60) % W;
    const y = (i * 71 + t * 120) % H;
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x - 4, y + 20); ctx.stroke();
  }
}

function drawFire() {
  for (let i = 0; i < 6; i++) {
    const x = W * (0.1 + i * 0.15) + Math.sin(t + i) * 20;
    const bh = 80 + Math.sin(t * 3 + i) * 30;
    const g = ctx.createRadialGradient(x, H - 20, 0, x, H - 20, bh);
    g.addColorStop(0, '#f5c842'); g.addColorStop(0.4, '#e11d48'); g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, H - 20, bh, 0, Math.PI*2); ctx.fill();
  }
}

// SVG character drawn via offscreen img
const charImgs = {};
function drawCharSVG(mood) {
  const key = MOOD_CHARS[currentMood] || 'spirit';
  const svg = CHARACTER_SVG[key];
  if (!svg) return;

  if (!charImgs[key]) {
    const img = new Image();
    const blob = new Blob([svg], {type: 'image/svg+xml'});
    img.src = URL.createObjectURL(blob);
    charImgs[key] = img;
    img.onload = () => {};
  }
  const img = charImgs[key];
  if (!img.complete || !img.naturalWidth) return;
  const scale = 1.5 + Math.sin(t * 0.8) * 0.05;
  const cw = img.naturalWidth * scale;
  const ch = img.naturalHeight * scale;
  const cx = W / 2 - cw / 2;
  const cy = H - ch - 40 + Math.sin(t * 0.5) * 8;
  ctx.save(); ctx.globalAlpha = 0.9;
  ctx.drawImage(img, cx, cy, cw, ch);
  ctx.restore();

  // Glow under character
  const g = ctx.createRadialGradient(W/2, H - 30, 0, W/2, H - 30, 120);
  g.addColorStop(0, mood.accent + '50'); g.addColorStop(1, 'transparent');
  ctx.fillStyle = g; ctx.fillRect(0, H - 150, W, 150);
}

// ══════════════════════════════════════════════
//  ANIMATION LOOP
// ══════════════════════════════════════════════

function loop() {
  t += 0.016;
  drawScene();
  updateParticles();
  requestAnimationFrame(loop);
}

// ══════════════════════════════════════════════
//  FACE API SETUP
// ══════════════════════════════════════════════

const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@latest/model';

async function setupCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
    video.srcObject = stream;
    return new Promise(res => video.onloadeddata = res);
  } catch(e) {
    document.getElementById('statusText').textContent = 'Camera access denied';
    throw e;
  }
}

async function loadModels() {
  document.getElementById('statusText').textContent = 'Loading dream models…';
  try {
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL)
    ]);
  } catch(e) {
    // fallback CDN
    const CDN2 = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights';
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(CDN2),
      faceapi.nets.faceExpressionNet.loadFromUri(CDN2)
    ]);
  }
}

const EXPR_MAP = {
  happy:'happy', sad:'sad', angry:'angry',
  fearful:'fearful', disgusted:'disgusted', surprised:'surprised', neutral:'neutral'
};
const EXPR_LABELS = {
  happy:'😄 Joyful', sad:'😢 Melancholy', angry:'😠 Furious',
  fearful:'😨 Terrified', disgusted:'🤢 Unnerved',
  surprised:'😲 Astonished', neutral:'😶 Dreaming'
};

let lastMoodChange = 0;
let lastStoryMood = '';

async function detectLoop() {
  if (!faceDetectionRunning) return;
  faceCanvas.width  = video.videoWidth  || 180;
  faceCanvas.height = video.videoHeight || 135;

  try {
    const det = await faceapi
      .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({inputSize:224}))
      .withFaceExpressions();

    if (det) {
      const exprs = det.expressions;
      const top = Object.entries(exprs).sort((a,b)=>b[1]-a[1])[0][0];
      const newMood = EXPR_MAP[top] || 'neutral';

      // Update badge
      const badge = document.getElementById('expressionBadge');
      badge.textContent = EXPR_LABELS[newMood] || '😶 Dreaming';
      badge.className = 'badge-' + newMood;

      if (newMood !== currentMood) {
        currentMood = newMood;
        spawnParticles(newMood);

        const now = Date.now();
        if (now - lastMoodChange > 4000 && newMood !== lastStoryMood) {
          lastMoodChange = now; lastStoryMood = newMood;
          triggerStory(newMood);
        }
      }

      // Draw face box
      faceCtx.clearRect(0, 0, faceCanvas.width, faceCanvas.height);
      const scaleX = faceCanvas.width  / (video.videoWidth  || 180);
      const scaleY = faceCanvas.height / (video.videoHeight || 135);
      const box = det.detection.box;
      faceCtx.strokeStyle = MOODS[currentMood]?.accent || '#a78bfa';
      faceCtx.lineWidth = 2;
      faceCtx.strokeRect(box.x * scaleX, box.y * scaleY, box.width * scaleX, box.height * scaleY);
    }
  } catch(e) {}

  setTimeout(detectLoop, 200);
}

async function triggerStory(mood) {
  const storyEl = document.getElementById('storyText');
  storyEl.classList.remove('visible');
  const story = await generateStory(mood);
  lastStory = story;
  storyEl.textContent = story;
  storyEl.classList.add('visible');

  // Save to log
  dreamLog.unshift({ mood, text: story, time: new Date().toLocaleTimeString() });
  if (dreamLog.length > 20) dreamLog.pop();
  localStorage.setItem('dreamLog', JSON.stringify(dreamLog));
  renderLog();

  if (storyTimeout) clearTimeout(storyTimeout);
  storyTimeout = setTimeout(() => storyEl.classList.remove('visible'), 7000);
}

// ══════════════════════════════════════════════
//  DREAM LOG UI
// ══════════════════════════════════════════════

function renderLog() {
  const el = document.getElementById('dreamLog');
  const entries = el.querySelectorAll('.log-entry');
  entries.forEach(e => e.remove());
  dreamLog.forEach(d => {
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `<div class="log-meta">${d.time} · ${(EXPR_LABELS[d.mood]||d.mood)}</div>${d.text}`;
    el.appendChild(div);
  });
}

function toggleLog() {
  logOpen = !logOpen;
  const el = document.getElementById('dreamLog');
  el.classList.toggle('open', logOpen);
  document.getElementById('logToggle').textContent = logOpen ? '✕ Close Log' : '📖 Dream Log';
}

function clearLog() {
  dreamLog = []; localStorage.removeItem('dreamLog');
  renderLog();
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════

async function init() {
  loop(); // Start rendering immediately

  try {
    await setupCamera();
    document.getElementById('statusText').textContent = 'Loading models…';
    await loadModels();
  } catch(e) {
    document.getElementById('status').style.display = 'none';
    document.getElementById('controls').style.display = 'flex';
    return;
  }

  // Hide status
  document.getElementById('status').style.display = 'none';
  document.getElementById('controls').style.display = 'flex';

  // Render saved log
  renderLog();

  // Start detection
  faceDetectionRunning = true;
  detectLoop();

  // Initial story
  setTimeout(() => triggerStory('neutral'), 1000);
}

init();
</script>
